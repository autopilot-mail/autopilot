name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0)'
        required: true
        type: string
      tag:
        description: 'npm dist-tag'
        required: false
        default: 'latest'
        type: choice
        options:
          - latest
          - next
          - beta
          - alpha

jobs:
  release:
    name: Tag & Release
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Bump version
        run: bash scripts/version.sh ${{ github.event.inputs.version }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin main --tags

      # The tag push triggers the publish workflow automatically
      - name: Summary
        run: |
          echo "## Release v${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag \`v${{ github.event.inputs.version }}\` pushed to main." >> $GITHUB_STEP_SUMMARY
          echo "The **Publish** workflow will run automatically to push packages to npm." >> $GITHUB_STEP_SUMMARY
