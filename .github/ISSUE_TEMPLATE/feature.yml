name: Feature Request
description: Suggest a new feature or improvement
labels: ['enhancement']
body:
  - type: textarea
    id: description
    attributes:
      label: What do you want?
      description: A clear description of the feature.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API (optional)
      description: How would you want to use this feature?
      render: typescript

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Storage adapter
        - Email transport
        - File storage provider
        - REST API
        - CLI / server
        - Types / SDK
        - Documentation
        - Other
