name: Bug Report
description: Something isn't working as expected
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      render: typescript

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - '@autopilot-mail/core'
        - '@autopilot-mail/postgres'
        - '@autopilot-mail/mongodb'
        - '@autopilot-mail/sqlite'
        - '@autopilot-mail/d1'
        - '@autopilot-mail/ses'
        - '@autopilot-mail/smtp'
        - '@autopilot-mail/s3'
        - '@autopilot-mail/r2'
        - '@autopilot-mail/archil'
        - '@autopilot-mail/server'
        - 'Other'
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: '0.1.0'

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Bun
        - Cloudflare Workers
        - Docker
        - Other
